<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --p: #1a237e; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        
        /* Search Box & Card UI */
        .container { max-width: 500px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; outline: none; }
        .btn-search { width: 100%; padding: 12px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        
        .month-card { background: #fff; border-left: 5px solid var(--p); border-radius: 8px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .month-info h4 { margin: 0; color: #333; }
        .month-info p { margin: 2px 0 0; font-size: 13px; color: #666; }
        .btn-view { background: #e91e63; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 12px; }

        /* EXACT PINK RECEIPT MODAL CSS */
        #receipt-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; padding: 15px; }
        .print-wrapper { display: flex; justify-content: space-between; gap: 10px; width: 100%; max-width: 1200px; margin: 0 auto; }
        .receipt-box { flex: 1; background: #ffdae9; border: 1.5px solid #000; padding: 12px; color: #000; font-family: 'Arial Narrow', Arial, sans-serif; min-height: 580px; position: relative; }
        .r-header { text-align: center; border-bottom: 1px solid #000; padding-bottom: 5px; margin-bottom: 5px; }
        .r-header h2 { margin: 0; font-size: 18px; font-weight: 900; }
        .r-header p { margin: 0; font-size: 9px; font-weight: bold; }
        .top-info { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px; }
        .copy-tag { border: 1px solid #000; padding: 1px 6px; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        .student-details { display: grid; grid-template-columns: 1.2fr 1fr; font-size: 10px; border-top: 1px solid #000; border-bottom: 1px solid #000; padding: 5px 0; line-height: 1.4; margin-bottom: 5px; }
        .r-table { width: 100%; border-collapse: collapse; }
        .r-table th, .r-table td { border: 0.5px solid #000; padding: 2px 4px; font-size: 10px; text-align: center; }
        .r-table td.left { text-align: left; }
        .sub-item { padding-left: 15px !important; font-style: italic; }
        .footer-sigs { display: flex; justify-content: space-between; margin-top: 25px; font-size: 10px; font-weight: bold; }

        @media print { 
            @page { size: A4 landscape; margin: 3mm; }
            .no-print { display: none !important; } 
            #receipt-modal { position: absolute; top:0; left:0; width:100%; display: block !important; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <h2 style="text-align:center; color:var(--p); font-size:18px;">Student Fee Record</h2>
    <input type="text" id="sid" placeholder="Enter Student ID (e.g. 13)">
    <button class="btn-search" onclick="doSearch()">SEARCH ALL MONTHS</button>
    <div id="resultsList"></div>
</div>

<div id="receipt-modal">
    <div class="print-wrapper">
        <div class="receipt-box" id="guardian-copy"></div>
        <div class="receipt-box" id="office-copy"></div>
    </div>
    <div class="no-print" style="text-align:center; margin-top:20px; padding-bottom: 30px;">
        <button onclick="window.print()" style="padding:12px 35px; background:green; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">PRINT BOTH COPIES</button>
        <button onclick="closeReceipt()" style="padding:12px 35px; background:#666; color:white; border:none; border-radius:6px; margin-left:10px; cursor:pointer;">BACK TO LIST</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYXysJEju_Ljzj6m-FhMtbptuLFB3vAIHk7FHT3c8yuafwKFOuShroGickq8kZ7wYisg/exec";
    let allRecords = [];

    async function doSearch() {
        var id = document.getElementById('sid').value;
        if(!id) return Swal.fire('Error', 'Please enter ID', 'error');
        
        document.getElementById('resultsList').innerHTML = "<p style='text-align:center'>Searching...</p>";
        try {
            const response = await fetch(`${SCRIPT_URL}?action=searchData&id=${id}`);
            allRecords = await response.json();
            
            if(!allRecords.length) {
                document.getElementById('resultsList').innerHTML = "<p style='color:red'>No records found!</p>";
                return;
            }

            let html = "";
            allRecords.reverse().forEach((record, index) => {
                html += `
                <div class="month-card">
                    <div class="month-info">
                        <h4>${record.Month || 'No Month'}</h4>
                        <p>Paid: ₹${record["Total Paid"]} | Date: ${record["Paid Date"] || 'N/A'}</p>
                    </div>
                    <button class="btn-view" onclick="viewReceipt(${index})">VIEW RECEIPT</button>
                </div>`;
            });
            document.getElementById('resultsList').innerHTML = html;
        } catch (e) { document.getElementById('resultsList').innerHTML = "Error!"; }
    }

    function viewReceipt(index) {
        const d = allRecords[index];
        document.getElementById('guardian-copy').innerHTML = renderHTML(d, "GUARDIAN'S COPY");
        document.getElementById('office-copy').innerHTML = renderHTML(d, "OFFICE COPY");
        document.getElementById('receipt-modal').style.display = 'block';
        document.querySelector('.container').style.display = 'none';
    }

    function closeReceipt() {
        document.getElementById('receipt-modal').style.display = 'none';
        document.querySelector('.container').style.display = 'block';
    }

    function renderHTML(d, type) {
        // EXACT ITEM LIST MAPPING FROM YOUR SCREENSHOT
        const items = [
            {n: "Prev. Dues", v: d["Prev Dues"]},
            {n: "Admission Fee", v: d["Admission Fee"]},
            {n: "School Fee", v: d["School Fee"]},
            {n: "School Van Fee", v: d["School Van Fee"]},
            {n: "Hostel & School Fee", v: d["Hostel & School Fee"]},
            {n: "Exam Fee", v: d["Exam Fee"]},
            {n: "<b>School Uniform Fee</b>", v: ""},
            {n: "(i) Shirts", v: d["Shirts"], s: true},
            {n: "(ii) Pants", v: d["Pants"], s: true},
            {n: "(iii) T-Shirts", v: d["T-Shirts"], s: true},
            {n: "(iv) Trousers", v: d["Trousers"], s: true},
            {n: "<b>School Books</b>", v: ""},
            {n: "(i) Books Fee", v: d["Books Fee"], s: true},
            {n: "(ii) Copies", v: d["Copies"], s: true},
            {n: "(iii) Cover", v: d["Cover"], s: true},
            {n: "(iv) Instrument Box", v: d["Instrument Box"], s: true},
            {n: "School Bag", v: d["School Bag"]},
            {n: "Development Fee", v: d["Development Fee"]},
            {n: "Other Fee", v: d["Other Fee"]}
        ];

        let rows = ""; let sl = 1;
        items.forEach(item => {
            let val = parseFloat(item.v);
            if((val && val > 0) || (item.n.includes("<b>"))) {
                rows += `<tr>
                    <td>${item.s || item.n.includes("<b>") ? "" : sl++}</td>
                    <td class="left ${item.s ? 'sub-item' : ''}">${item.n}</td>
                    <td>${val > 0 ? "1" : ""}</td>
                    <td>${val > 0 ? val : ""}</td>
                </tr>`;
            }
        });

        return `
            <div class="r-header">
                <div style="display:flex; justify-content:space-between;"><span class="copy-tag">${type}</span><span>UDISE: 10101122703</span></div>
                <h2>SAGAR PUBLIC SCHOOL</h2>
                <p>BARSOI, KATIHAR, BIHAR</p>
                <p style="font-size:7px">email: sagarpublicschool2023@gmail.com</p>
            </div>
            <div class="top-info"><span>Sl: A-${Math.floor(1000 + Math.random()*9000)}</span><span>Date: ${d["Paid Date"] || ""}</span></div>
            <div class="student-details">
                <div><b>Name:</b> ${d["Student Name"]}</div><div><b>ID:</b> ${d["Student Id"]}</div>
                <div><b>Father:</b> ${d["Father Name"]}</div><div><b>Class:</b> ${d["Class"]}</div>
                <div><b>Address:</b> ${d["Address"] || "Barsoi"}</div><div><b>Month:</b> ${d["Month"]}</div>
            </div>
            <table class="r-table">
                <thead><tr><th width="30">Sl.</th><th>Description</th><th width="30">Qty</th><th width="60">Amount</th></tr></thead>
                <tbody>${rows}</tbody>
                <tfoot>
                    <tr><td colspan="3" align="right"><b>Sub Total</b></td><td>${d["Sub Total"]}</td></tr>
                    <tr><td colspan="3" align="right"><b>Paid</b></td><td><b>${d["Total Paid"]}</b></td></tr>
                    <tr><td colspan="3" align="right"><b>Due</b></td><td style="color:red"><b>${d["Remaining"]}</b></td></tr>
                </tfoot>
            </table>
            <div style="font-size:9px; margin-top:5px; border-bottom:1px dotted #000"><b>Words:</b> ${d["Total Paid"]} Only.</div>
            <div class="footer-sigs"><span>Parent Signature</span><span>Authorized Signature</span></div>
        `;
    }
</script>
</body>
</html>
