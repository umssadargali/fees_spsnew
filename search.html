<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --p: #1a237e; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        
        .container { max-width: 500px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; outline: none; }
        .btn-search { width: 100%; padding: 12px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        
        .month-card { background: #fff; border-left: 5px solid var(--p); border-radius: 8px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .month-info h4 { margin: 0; color: #333; }
        .month-info p { margin: 2px 0 0; font-size: 13px; color: #666; }
        .btn-view { background: #e91e63; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 12px; }

        /* EXACT RECEIPT DESIGN FROM INDEX.HTML */
        #receipt-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; padding: 20px; }
        .print-wrapper { display: flex; justify-content: space-between; gap: 20px; width: 100%; max-width: 1100px; margin: 0 auto; }
        .receipt-box { flex: 1; background: #ffdae9; border: 2px solid #000; padding: 15px; color: #000; position: relative; font-family: Arial, sans-serif; }
        .receipt-inner { position: relative; z-index: 1; }
        .r-header { text-align: center; }
        .r-header h2 { margin: 0; font-size: 18px; font-weight: 900; }
        .r-header p { margin: 1px; font-size: 9px; font-weight: bold; }
        .top-info { display: flex; justify-content: space-between; font-size: 10px; margin-top: 5px; border-bottom: 1px solid #000; padding-bottom: 2px; }
        .copy-tag { background: #000; color: #fff; padding: 2px 8px; font-size: 10px; font-weight: bold; text-transform: uppercase; border-radius: 3px; }
        .student-details { display: grid; grid-template-columns: 1fr 1fr; font-size: 10px; margin-top: 8px; line-height: 1.5; }
        .r-table { width: 100%; border-collapse: collapse; margin-top: 5px; border: 1px solid #000; }
        .r-table th, .r-table td { border: 1px solid #000; padding: 3px; font-size: 10px; }
        .words-section { border-bottom: 1px dotted #000; padding: 3px 0; font-size: 10px; margin-top: 5px; font-style: italic; }
        .footer-sigs { display: flex; justify-content: space-between; margin-top: 30px; font-size: 10px; font-weight: bold; }

        @media print { 
            @page { size: A4 landscape; margin: 10mm; }
            .no-print { display: none !important; } 
            #receipt-modal { position: absolute; top:0; left:0; width:100%; display: block !important; padding: 0; }
            .print-wrapper { gap: 10px; }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <h2 style="text-align:center; color:var(--p); font-size:18px;">Search Fee Record</h2>
    <input type="text" id="sid" placeholder="Enter Student ID">
    <button class="btn-search" onclick="doSearch()">SEARCH ALL MONTHS</button>
    <div id="resultsList"></div>
</div>

<div id="receipt-modal">
    <div class="print-wrapper">
        <div class="receipt-box" id="guardian-copy"></div>
        <div class="receipt-box" id="office-copy"></div>
    </div>
    <div class="no-print" style="text-align:center; margin-top:20px;">
        <button onclick="window.print()" style="padding:12px 35px; background:#2e7d32; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">PRINT / SAVE PDF</button>
        <button onclick="closeReceipt()" style="padding:12px 35px; background:#666; color:white; border:none; border-radius:6px; margin-left:10px; cursor:pointer;">CLOSE</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYXysJEju_Ljzj6m-FhMtbptuLFB3vAIHk7FHT3c8yuafwKFOuShroGickq8kZ7wYisg/exec";
    let allRecords = [];

    function roman(n) { const r = ["i","ii","iii","iv","v","vi","vii","viii","ix","x"]; return r[n-1] || n; }

    function numberToWords(num) {
        var a = ['','One ','Two ','Three ','Four ', 'Five ','Six ','Seven ','Eight ','Nine ','Ten ','Eleven ','Twelve ','Thirteen ','Fourteen ','Fifteen ','Sixteen ','Seventeen ','Eighteen ','Nineteen '];
        var b = ['', '', 'Twenty','Thirty','Forty','Fifty', 'Sixty','Seventy','Eighty','Ninety'];
        if (num == 0) return 'Zero';
        if ((num = num.toString()).length > 9) return '';
        var n = ('000000000' + num).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
        if (!n) return ''; var str = '';
        str += (n[1] != 0) ? (a[Number(n[1])] || b[n[1][0]] + ' ' + a[n[1][1]]) + 'Crore ' : '';
        str += (n[2] != 0) ? (a[Number(n[2])] || b[n[2][0]] + ' ' + a[n[2][1]]) + 'Lakh ' : '';
        str += (n[3] != 0) ? (a[Number(n[3])] || b[n[3][0]] + ' ' + a[n[3][1]]) + 'Thousand ' : '';
        str += (n[4] != 0) ? (a[Number(n[4])] || b[n[4][0]] + ' ' + a[n[4][1]]) + 'Hundred ' : '';
        str += (n[5] != 0) ? ((str != '') ? 'and ' : '') + (a[Number(n[5])] || b[n[5][0]] + ' ' + a[n[5][1]]) : '';
        return str.trim();
    }

    async function doSearch() {
        var id = document.getElementById('sid').value;
        if(!id) return;
        document.getElementById('resultsList').innerHTML = "<p style='text-align:center'>Searching...</p>";
        try {
            const res = await fetch(`${SCRIPT_URL}?action=searchData&id=${id}`);
            allRecords = await res.json();
            if(!allRecords.length) { document.getElementById('resultsList').innerHTML = "No record found"; return; }
            let html = "";
            allRecords.reverse().forEach((r, i) => {
                html += `<div class="month-card">
                    <div class="month-info"><h4>${r.Month}</h4><p>Paid: ₹${r["Total Paid"]}</p></div>
                    <button class="btn-view" onclick="viewReceipt(${i})">VIEW RECEIPT</button>
                </div>`;
            });
            document.getElementById('resultsList').innerHTML = html;
        } catch(e) { document.getElementById('resultsList').innerHTML = "Error!"; }
    }

    function viewReceipt(index) {
        const d = allRecords[index];
        document.getElementById('guardian-copy').innerHTML = generateReceiptHTML(d, "Guardian's Copy");
        document.getElementById('office-copy').innerHTML = generateReceiptHTML(d, "Office Copy");
        document.getElementById('receipt-modal').style.display = 'block';
        document.querySelector('.container').style.display = 'none';
    }

    function closeReceipt() {
        document.getElementById('receipt-modal').style.display = 'none';
        document.querySelector('.container').style.display = 'block';
    }

    // HU-BA-HU COPY FROM INDEX.HTML
    function generateReceiptHTML(d, type) {
        let sl = 1; let rows = "";
        const main = ["Prev Dues", "Admission Fee", "School Fee", "School Van Fee", "Hostel Fee", "Exam Fee"];
        main.forEach(k => { if(d[k]>0) rows += `<tr><td align="center">${sl++}.</td><td>${k}</td><td align="center">1</td><td align="center">${d[k]}</td></tr>`; });
        
        // Dynamic Groups Logic
        const uniKeys = ["Shirts", "Pants", "T-Shirts", "Trousers"];
        let hasUni = false; uniKeys.forEach(k => { if(d[k]>0) hasUni = true; });
        if(hasUni) {
            rows += `<tr><td align="center">${sl++}.</td><td colspan="3"><b>School Uniform Fee</b></td></tr>`;
            uniKeys.forEach((k, i) => { if(d[k]>0) rows += `<tr><td></td><td>(${roman(i+1)}) ${k}</td><td align="center">1</td><td align="center">${d[k]}</td></tr>`; });
        }

        const bookKeys = ["Books Fee", "Copies", "Cover", "Instrument Box"];
        let hasBook = false; bookKeys.forEach(k => { if(d[k]>0) hasBook = true; });
        if(hasBook) {
            rows += `<tr><td align="center">${sl++}.</td><td colspan="3"><b>School Books & Other</b></td></tr>`;
            bookKeys.forEach((k, i) => { if(d[k]>0) rows += `<tr><td></td><td>(${roman(i+1)}) ${k}</td><td align="center">1</td><td align="center">${d[k]}</td></tr>`; });
        }

        const othKeys = ["Republic Day Fee", "Independence Day Fee", "UDISE Fee"];
        let hasOth = false; othKeys.forEach(k => { if(d[k]>0) hasOth = true; });
        if(hasOth) {
            rows += `<tr><td align="center">${sl++}.</td><td colspan="3"><b>Miscellaneous Fees</b></td></tr>`;
            othKeys.forEach((k, i) => { if(d[k]>0) rows += `<tr><td></td><td>(${roman(i+1)}) ${k}</td><td align="center">1</td><td align="center">${d[k]}</td></tr>`; });
        }

        const extra = ["School Bag", "Development Fee", "Other Fee"];
        extra.forEach(k => { if(d[k]>0) rows += `<tr><td align="center">${sl++}.</td><td>${k}</td><td align="center">1</td><td align="center">${d[k]}</td></tr>`; });

        return `<div class="receipt-inner">
                <div class="r-header">
                    <div style="display:flex; justify-content:space-between;"><span class="copy-tag">${type}</span><span style="font-size:9px">UDISE: 10101122703</span></div>
                    <h2>SAGAR PUBLIC SCHOOL</h2>
                    <p>QUAZITOLA, BARSOI (KATIHAR)</p>
                    <p style="font-size:8px">email: sagarpublicschool2023@gmail.com</p>
                    <p style="font-size:7px">RTE Reg No.21211472023218114225 | UDISE No.10101122703</p>
                </div>
                <div class="top-info"><span>Sl: A-${Math.floor(1000 + Math.random()*9000)}</span><span>Date: ${d["Paid Date"] || ""}</span></div>
                <div class="student-details">
                    <div><b>Name:</b> ${d["Student Name"]}</div><div><b>ID:</b> ${d["Student Id"]}</div>
                    <div><b>Father:</b> ${d["Father Name"]}</div><div><b>Class:</b> ${d["Class"]}</div>
                    <div><b>Address:</b> ${d["Address"]}</div><div><b>Month:</b> ${d["Month"]}</div>
                </div>
                <table class="r-table">
                    <thead><tr><th>Sl.</th><th>Description</th><th>Qty</th><th>Amount</th></tr></thead>
                    <tbody>${rows}</tbody>
                    <tfoot>
                        <tr><th colspan="3" align="right">Sub Total</th><td align="center">${d["Sub Total"]}</td></tr>
                        <tr><th colspan="3" align="right">Discount (-)</th><td align="center">${d["Discount"] || 0}</td></tr>
                        <tr><th colspan="3" align="right">Net Paid</th><td align="center"><b>${d["Total Paid"]}</b></td></tr>
                        <tr><th colspan="3" align="right">Due Balance</th><td align="center" style="color:red"><b>${d["Remaining"]}</b></td></tr>
                    </tfoot>
                </table>
                <div class="words-section"><b>Words:</b> ${numberToWords(d["Total Paid"])} Only.</div>
                <div class="footer-sigs"><span>Parent Signature</span><span>Authorized Signature</span></div>
            </div>`;
    }
</script>
</body>
</html>
