<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #1a237e; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 99%; margin: auto; }
        
        /* Filters & Buttons */
        .filter-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; justify-content: center; align-items: flex-end; background: #f8f9fa; padding: 10px; border-radius: 8px; }
        .f-group { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; color: #555; margin-bottom: 3px; }
        select, input { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 12px; outline: none; }
        
        /* Search Box Styling */
        .search-box { flex-grow: 1; min-width: 200px; border: 2px solid var(--p) !important; background: #fff; }
        
        .btn { background: var(--p); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-print { background: #2e7d32; }

        /* --- 100% DYNAMIC STICKY TABLE SETTINGS --- */
        .t-wrap { overflow: auto; height: 75vh; border: 1px solid #ddd; position: relative; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 11px; white-space: nowrap; }
        
        /* TOP HEADER STICKY */
        thead th { 
            background: #1a237e; color: #ffffff; padding: 10px 12px; 
            border: 1px solid #ddd; position: sticky; top: 0; z-index: 100;
        }
        
        td { padding: 6px 10px; border: 1px solid #ddd; text-align: center; background: #fff; }

        /* STICKY CLASSES */
        .sticky-id { position: sticky; left: 0; z-index: 50; background: #f1f1f1 !important; border-right: 1px solid #ccc !important; }
        .sticky-name { position: sticky; left: 55px; z-index: 50; background: #f1f1f1 !important; border-right: 1px solid #ccc !important; }
        .sticky-father { position: sticky; left: 165px; z-index: 50; background: #f1f1f1 !important; border-right: 2px solid #bbb !important; }

        th.sticky-id, th.sticky-name, th.sticky-father { z-index: 110; top: 0; }

        /* FOOTER STICKY */
        .total-row td { 
            background: #ffc107 !important; font-weight: bold; color: #000; 
            position: sticky; bottom: 0; z-index: 90;
            border-top: 2px solid #000;
        }
        
        tr:nth-child(even) td { background: #fafafa; }
        tr:hover td { background: #e3f2fd !important; }

        @media print { .no-print { display: none; } .card { box-shadow: none; width: 100%; } .t-wrap { overflow: visible; height: auto; } }
    </style>
</head>
<body>

<div class="card">
    <h4 style="text-align:center; color:var(--p); margin: 5px 0;">SPS MASTER COLLECTION REPORT</h4>
    
    <div class="filter-row no-print">
        <div class="f-group">
            <label>MONTH</label>
            <select id="monthInput">
                <option>January</option><option>February</option><option>March</option>
                <option>April</option><option>May</option><option>June</option>
                <option>July</option><option>August</option><option>September</option>
                <option>October</option><option>November</option><option>December</option>
            </select>
        </div>
        <div class="f-group">
            <label>DATE (Optional)</label>
            <input type="date" id="dateInput">
        </div>
        <div class="f-group" style="flex-grow: 1;">
            <label>LIVE FILTER (Name, Class, ID...)</label>
            <input type="text" id="liveSearch" class="search-box" placeholder="Type to filter..." onkeyup="applyFilter()">
        </div>
        
        <button class="btn" onclick="loadFullSheet()">REFRESH LIVE DATA</button>
        <button class="btn btn-print" onclick="window.print()">PRINT</button>
    </div>

    <div class="t-wrap">
        <table id="masterTable">
            <thead id="headerRow"></thead>
            <tbody id="tableBody">
                <tr><td colspan="50" style="padding:40px;">Syncing data from Google Sheet...</td></tr>
            </tbody>
            <tfoot id="footerRow"></tfoot>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyYXysJEju_Ljzj6m-FhMtbptuLFB3vAIHk7FHT3c8yuafwKFOuShroGickq8kZ7wYisg/exec";
    let MASTER_DATA = []; // Original data store

    async function loadFullSheet() {
        const month = document.getElementById('monthInput').value;
        const dateVal = document.getElementById('dateInput').value;
        let fDate = "", aDate = "";
        if(dateVal) {
            let d = dateVal.split("-");
            fDate = `${d[2]}/${d[1]}/${d[0]}`; 
            aDate = `${parseInt(d[2])}/${parseInt(d[1])}/${d[0]}`; 
        }

        document.getElementById('tableBody').innerHTML = "<tr><td colspan='50'>Syncing...</td></tr>";

        try {
            const res = await fetch(`${WEB_APP_URL}?action=getReportData&month=${month}`);
            const data = await res.json();
            
            if (!data.rows || data.rows.length === 0) {
                document.getElementById('tableBody').innerHTML = "<tr><td colspan='50'>No records found.</td></tr>";
                return;
            }

            // Store for live filtering
            MASTER_DATA = data.rows.filter(r => {
                if(!dateVal) return true;
                let rowD = r["Paid Date"] || r["Date"] || "";
                return (rowD === fDate || rowD === aDate || rowD === dateVal);
            });

            renderTable(MASTER_DATA);

        } catch (e) {
            document.getElementById('tableBody').innerHTML = "<tr><td colspan='50'>Error: Connection failed.</td></tr>";
        }
    }

    // 100% Dynamic Class Assigner
    const getCls = (h) => {
        let name = h.toLowerCase();
        if(name === "student id" || name === "id") return "sticky-id";
        if(name === "student name" || name === "name") return "sticky-name";
        if(name === "father name" || name === "father's name") return "sticky-father";
        return "";
    };

    function applyFilter() {
        const query = document.getElementById('liveSearch').value.toLowerCase();
        const filtered = MASTER_DATA.filter(row => {
            return Object.values(row).some(val => 
                String(val).toLowerCase().includes(query)
            );
        });
        renderTable(filtered);
    }

    function renderTable(dataRows) {
        if (dataRows.length === 0) {
            document.getElementById('tableBody').innerHTML = "<tr><td colspan='50'>No matching records.</td></tr>";
            document.getElementById('footerRow').innerHTML = "";
            return;
        }

        const headers = Object.keys(dataRows[0]);

        // Header Build
        let hHtml = "<tr>";
        headers.forEach(h => hHtml += `<th class="${getCls(h)}">${h}</th>`);
        hHtml += "</tr>";
        document.getElementById('headerRow').innerHTML = hHtml;

        // Body & Sums
        let bHtml = "";
        let sums = {};
        headers.forEach(h => sums[h] = 0);

        dataRows.forEach(row => {
            bHtml += "<tr>";
            headers.forEach(h => {
                let val = row[h] === undefined || row[h] === null ? "" : row[h];
                let style = "";
                if(h.toLowerCase().includes("paid")) style = "color: green; font-weight:bold;";
                if(h.toLowerCase().includes("bal") || h.toLowerCase().includes("rem")) style = "color: red; font-weight:bold;";
                
                bHtml += `<td class="${getCls(h)}" style="${style}">${val}</td>`;
                
                let skipFields = ["id", "student id", "class", "name", "student name", "father name", "address", "date", "paid date", "month"];
                if(!skipFields.includes(h.toLowerCase())) {
                    let num = parseFloat(val);
                    if(!isNaN(num)) sums[h] += num;
                }
            });
            bHtml += "</tr>";
        });
        document.getElementById('tableBody').innerHTML = bHtml;

        // Footer Build (Automatic Total for Filtered Results)
        let fHtml = "<tr class='total-row'>";
        headers.forEach((h, i) => {
            let cls = getCls(h);
            if(i === 0) fHtml += `<td class="${cls}">TOTAL</td>`;
            else if (h.toLowerCase().includes("name") && !h.toLowerCase().includes("father")) {
                fHtml += `<td class="${cls}">${dataRows.length} Stud.</td>`;
            } else {
                let skipFields = ["id", "student id", "class", "father name", "address", "date", "paid date", "month"];
                if(skipFields.includes(h.toLowerCase())) fHtml += `<td class="${cls}">-</td>`;
                else fHtml += `<td>${sums[h] !== 0 ? sums[h].toLocaleString() : "0"}</td>`;
            }
        });
        fHtml += "</tr>";
        document.getElementById('footerRow').innerHTML = fHtml;
    }

    // Auto load on first run
    window.onload = loadFullSheet;
</script>
</body>
</html>
